---
layout: layouts/main.html
---
<div class="art-page-img-div">
    <img src="/img/art/{{ fileName }}"/>
</div>

<h2>{{ title }}</h2>
<p>{{ date | artDate }}</p>

<p>Categories: {% for category in categories %}<a class="art-tag" href="/category/{{ category | slugify }}">{{ category }}</a>{% endfor %}</p>

<p>Tags: {{ artTags | listTags | safe }}</p>

<hr class="hr-line">

{{ content | safe }}
